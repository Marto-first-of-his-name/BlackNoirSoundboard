<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Noir Soundboard</title>

<style>
    body{
    background:#121212;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;
	}

	.sampler{

		background:#252525;

		padding:30px;

		border-radius:15px;

		box-shadow:
			0 15px 50px rgba(0,0,0,.6),
			inset 0 2px 2px rgba(255,255,255,.05);

		display:grid;

		grid-template-columns:repeat(4,110px);
		grid-template-rows:repeat(4,110px);

		gap:10px;
	}

	.pad{

		border:none;

		background:#ececec;

		color:#111;

		font-weight:bold;

		font-size:18px;

		border-radius:8px;

		cursor:pointer;

		box-shadow:
			inset 0 2px 0 rgba(255,255,255,.8),
			inset 0 -4px 0 rgba(0,0,0,.15),
			0 3px 5px rgba(0,0,0,.25);

		transition:.05s;
	}

	.pad:hover{
		filter:brightness(1.05);
	}

	.pad:active{
		transform:translateY(3px);

		box-shadow:
			inset 0 2px 0 rgba(255,255,255,.4),
			0 1px 2px rgba(0,0,0,.3);
	}

	.dark{
		background:#111;
		color:white;
	}

	.green{
		background:#f2f2f2;
		color:#00a96e;
		font-size:40px;
	}

	.orange{
		background:#e26a2c;
		color:white;
		font-size:42px;
	}

	.red{
		background:#f2674a;
		color:white;
	}
	h1{
		color:#FFFFFF
	 }
	 .footer{
		color:#FFFFFF
	 }
</style>


</head>

<body>

<div class="container">

    <h1>BLACK NOIR SOUNDBOARD</h1>

    <div class="sampler">

    <button class="pad" onclick="playSound('manhandled')">MAN<br>HANDLED</button>
    <button class="pad" onclick="playSound('preach')">P-P-P-PREACH</button>
    <button class="pad" onclick="playSound('fuckyou')">FUCK<br>YOU</button>
    <button class="pad" onclick="playSound('bitch')">BITCH</button>

    <button class="pad dark" onclick="playSound('bitchesbecray')">
        BITCHES BE CRAY
    </button>

    <button class="pad dark" onclick="playSound('drumroll')">
        DRUM ROLL
    </button>
	<button class="pad dark" onclick="playSound('legendsrus')">LEGENDS R US</button>
	
    <button class="pad dark" onclick="playSound('sayswhat')">SAYS WHAT</button>
	
    <button class="pad" onclick="playSound('lockherup')">LOCK HER UP</button>
    <button class="pad" onclick="playSound('thebrooky')">THE BROOKY</button>
    <button class="pad" onclick="playSound('tourdates')">TOUR DATES</button>
    <button class="pad" onclick="playSound('yolobolo')">YOLO BOLO</button>
    <button class="pad dark" onclick="playSound('deepthoughts')">DEEP THOUGHTS</button>
    <button class="pad dark" onclick="playSound('yourproblemshavebeen')">YOUR PROBLEMS HAVE BEEN...</button>

	</div>

    <div class="controls">
		<br>
        <button class="stop-btn" onclick="stopAllSounds()">
            STOP ALL
        </button>
		<br><br>
		<label style="color:white;">Volume</label><br>
		<input type="range" min="0" max="1" step="0.01" value="1" id="volumeSlider">
    </div>
	<br>
    <div class="footer">
        Keyboard shortcuts: 1-9, 0, h, j, k, l, esc.
    </div>

</div>

<!-- Audio Files -->
<audio id="manhandled" src="sounds/Manhandled.mp3"></audio>
<audio id="preach" src="sounds/P-P-P-Preaaaach.mp3"></audio>
<audio id="fuckyou" src="sounds/FuckYou.mp3"></audio>
<audio id="bitch" src="sounds/Bitch.mp3"></audio>
<audio id="bitchesbecray" src="sounds/BitchesBeCray.mp3"></audio>
<audio id="drumroll" src="sounds/drumRoll.mp3"></audio>
<audio id="legendsrus" src="sounds/LegendsRUs.mp3"></audio>
<audio id="sayswhat" src="sounds/SaysWhat.mp3"></audio>
<audio id="lockherup" src="sounds/LockHerUp.mp3"></audio>
<audio id="thebrooky" src="sounds/TheBrooky.mp3"></audio>
<audio id="tourdates" src="sounds/TourDates.mp3"></audio>
<audio id="yolobolo" src="sounds/YoloBolo.mp3"></audio>
<audio id="deepthoughts" src="sounds/DeepThoughts.mp3"></audio>
<audio id="yourproblemshavebeen" src="sounds/YourProblemsHaveBeen.mp3"></audio>

<script>

function playSound(id) {
    const sound = document.getElementById(id);

    sound.pause();
    sound.currentTime = 0;

    // ensure it respects current slider value
    const volumeSlider = document.getElementById("volumeSlider");
    sound.volume = volumeSlider.value;

    sound.play();
}

function stopAllSounds() {
    const sounds = document.querySelectorAll("audio");

    sounds.forEach(sound => {
        sound.pause();
        sound.currentTime = 0;
    });
}

document.addEventListener("keydown", event => {

    switch(event.key) {
        case "1":
            playSound("manhandled");
            break;

        case "2":
            playSound("preach");
            break;

        case "3":
            playSound("fuckyou");
            break;

        case "4":
            playSound("bitch");
            break;

        case "5":
            playSound("bitchesbecray");
            break;

        case "6":
            playSound("drumroll");
            break;

        case "7":
            playSound("legendsrus");
            break;

        case "8":
            playSound("sayswhat");
            break;

        case "9":
            playSound("lockherup");
            break;

        case "0":
            playSound("thebrooky");
            break;

        case "h":
            playSound("tourdates");
            break;

        case "j":
            playSound("yolobolo");
            break;

        case "k":
            playSound("deepthoughts");
            break;

        case "l":
            playSound("yourproblemshavebeen");
            break;

        case "Escape":
            stopAllSounds();
            break;
    }

});

const volumeSlider = document.getElementById("volumeSlider");

// set initial volume for all audio elements
function setGlobalVolume(value) {
    const sounds = document.querySelectorAll("audio");
    sounds.forEach(sound => {
        sound.volume = value;
    });
}

// update volume when slider moves
volumeSlider.addEventListener("input", (e) => {
    setGlobalVolume(e.target.value);
});
</script>

</body>
</html>
